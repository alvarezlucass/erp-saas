<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venzo — Gestión Integrada</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #1a1a1a;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
    }

    .layout {
      display: grid;
      grid-template-columns: 230px 1fr;
      gap: 0;
      border: 0.5px solid #ddd;
      border-radius: 12px;
      overflow: hidden;
      min-height: 520px;
      background: #fff;
    }

    .sidebar {
      background: #f8f8f6;
      border-right: 0.5px solid #ddd;
      padding: 8px 0;
      overflow-y: auto;
    }

    .section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      padding: 12px 14px 4px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      cursor: pointer;
      transition: background 0.12s;
      border-left: 2px solid transparent;
    }

    .menu-item:hover {
      background: #fff;
    }

    .menu-item.active {
      background: #fff;
      border-left-color: #1D9E75;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .menu-label {
      font-size: 12.5px;
      color: #1a1a1a;
    }

    .badge-sm {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 8px;
      margin-left: auto;
      white-space: nowrap;
    }

    .b-teal {
      background: #E1F5EE;
      color: #0F6E56;
    }

    .b-blue {
      background: #E6F1FB;
      color: #185FA5;
    }

    .b-gray {
      background: #F1EFE8;
      color: #5F5E5A;
    }

    .detail {
      background: #fff;
      padding: 22px 24px;
      overflow-y: auto;
    }

    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .detail-title {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .detail-badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .detail-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 16px;
      border-left: 2px solid #eee;
      padding-left: 10px;
    }

    .sub-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 8px;
    }

    .sub-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .sub-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 12px;
      background: #f8f8f6;
      border-radius: 8px;
      border: 0.5px solid #e8e8e8;
    }

    .sub-icon {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }

    .sub-name {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 2px;
    }

    .sub-desc {
      font-size: 12px;
      color: #888;
      line-height: 1.5;
    }

    .empty {
      color: #bbb;
      font-size: 13px;
      padding: 60px 0;
      text-align: center;
    }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #888;
    }

    .leg-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
  </style>
</head>

<body>

  <h1>Unifai — Explorador de módulos</h1>

      <div class="leg-dot" style="background:#1D9E75"></div> Ya existe / en desarrollo

    </div>

  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="detail" id="detail">

    </div>
  </div>

          { id: "equipo", label: "Gestión de equipo", status: "existe", desc: "Alta de usuarios del sistema con asignación de roles y permisos de acceso por módulo.", subs: [{ name: "Alta de usuarios", desc: "Nombre, mail, contraseña y rol asignado." }, { name: "Roles predefinidos", desc: "Vendedor, depósito, administrador, dueño." }, { name: "Permisos por módulo", desc: "Qué puede ver y editar cada rol." }] },
          { id: "admin", label: "Administración", status: "existe", desc: "Configuración general del sistema: datos de la empresa, parámetros de operación y preferencias globales.", subs: [{ name: "Datos de la empresa", desc: "Razón social, CUIT, domicilio, logo." }, { name: "Parámetros generales", desc: "Moneda, redondeo, formato de fechas." }, { name: "Configuración de módulos", desc: "Activar o desactivar módulos contratados." }] },
          { id: "cargadatos", label: "Carga de datos", status: "existe", desc: "Importación masiva de productos, clientes y proveedores desde planillas Excel. Facilita la migración inicial.", subs: [{ name: "Importar productos", desc: "Carga masiva desde plantilla Excel con variantes." }, { name: "Importar clientes", desc: "Base de clientes existentes con datos y saldos." }, { name: "Importar proveedores", desc: "Listado de proveedores con condiciones." }] },
          { id: "roles", label: "Roles y permisos avanzados", status: "próximo", desc: "Permisos granulares por acción dentro de cada módulo. Define exactamente qué puede hacer cada usuario.", subs: [{ name: "Roles personalizados", desc: "Crea roles propios más allá de los predefinidos." }, { name: "Permisos por acción", desc: "Ver / crear / editar / eliminar por módulo." }, { name: "Auditoría de accesos", desc: "Log de quién hizo qué y cuándo." }] }
        ]
      }
    ];

    const statusColor = {
      "existe": { dot: "#1D9E75", badge: "b-teal", label: "existe" },
      "próximo": { dot: "#378ADD", badge: "b-blue", label: "próximo" },
      "futuro": { dot: "#888780", badge: "b-gray", label: "futuro" }
    };

    let selected = null;

    function renderSidebar() {
      const sb = document.getElementById("sidebar");
      let html = "";
      data.forEach(sec => {
        html += `<div class="section-label">${sec.section}</div>`;
        sec.items.forEach(item => {
          const s = statusColor[item.status];
          html += `<div class="menu-item" id="mi-${item.id}" onclick="selectItem('${item.id}')">
        <div class="dot" style="background:${s.dot}"></div>
        <span class="menu-label">${item.label}</span>
        <span class="badge-sm ${s.badge}">${s.label}</span>
      </div>`;
        });
      });
      sb.innerHTML = html;
    }

    function selectItem(id) {
      let found = null;
      data.forEach(sec => sec.items.forEach(item => { if (item.id === id) found = item; }));
      if (!found) return;
      if (selected) {
        const prev = document.getElementById("mi-" + selected);
        if (prev) prev.classList.remove("active");
      }
      selected = id;
      const curr = document.getElementById("mi-" + id);
      if (curr) curr.classList.add("active");
      const s = statusColor[found.status];
      let subsHtml = found.subs.map(sub => `
    <div class="sub-item">
      <div class="sub-icon" style="background:${s.dot}"></div>
      <div>
        <div class="sub-name">${sub.name}</div>
        <div class="sub-desc">${sub.desc}</div>
      </div>
    </div>`).join("");
      document.getElementById("detail").innerHTML = `
    <div class="detail-header">
      <div class="detail-title">${found.label}</div>
      <span class="detail-badge ${s.badge}">${s.label}</span>
    </div>
    <div class="detail-desc">${found.desc}</div>
    <div class="sub-title">Submenús y funciones</div>
    <div class="sub-list">${subsHtml}</div>
  `;
    }

    renderSidebar();
  </script>
</body>

</html>
