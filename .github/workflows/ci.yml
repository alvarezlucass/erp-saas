name: CI — Unifai

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── BACKEND ──────────────────────────────────────────────────────────────
  backend:
    name: Backend · TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/unifai

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ─── FRONTEND ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend · Build & type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.railway.app/api
